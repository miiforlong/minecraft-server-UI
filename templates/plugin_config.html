<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Configuration of {{ plugin }}</title>
<script>
async function saveConfig() {
    const content = document.getElementById("configArea").value;
    const res = await fetch("/plugins_config/{{ plugin }}", {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: new URLSearchParams({config: content})
    });
    const data = await res.json();
    alert(data.status);
}
</script>
</head>
<body>
<h1>Configuration of {{ plugin }}</h1>
<textarea id="configArea" rows="20" cols="80">{{ config }}</textarea><br>
<button onclick="saveConfig()">Save</button>
</body>
</html>
